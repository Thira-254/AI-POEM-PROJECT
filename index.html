<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Poem Generator</title>
    <link rel="stylesheet" href="src/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/axios@1.13.2/dist/axios.min.js"></script>
    <script src="https://unpkg.com/typewriter-effect@latest/dist/core.js"></script>
  </head>
  <body>
    <header>
      <h1>AI Poem generator</h1>
    </header>
    <main>
      <form class="form">
        <input
          type="text"
          class="instructions"
          placeholder="Type in your topic"
          autofocus
          required
          autocomplete="off"
        />
        <input type="submit" class="submit-button" />
      </form>
      <div class="poem" id="poem"></div>
    </main>
    <footer>
      This project was coded by
      <a href="https://github.com/Thira-254" target="_blank">Thira-254</a> and
      is open-sourced on
      <a href="https://github.com/Thira-254/AI-POEM-PROJECT" target="_blank"
        >GitHub</a
      >
      and hosted on
      <a
        href="https://app.netlify.com/projects/poems-generator-project/overview"
        target="_blank"
        >Netlify</a
      >
    </footer>
    <script src="src/index.js"></script>
  </body>
</html>
